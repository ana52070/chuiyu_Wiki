<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" font-family="'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title{font-size:24px;font-weight:700;fill:#0f172a}
      .sub{font-size:13px;fill:#64748b}
      .head{font-size:17px;font-weight:700;fill:#ffffff}
      .box{font-size:15px;font-weight:600;fill:#0f172a}
      .note{font-size:12px;fill:#475569}
      .tag{font-size:13px;font-weight:600}
      .flow{stroke:#475569;stroke-width:2;fill:none}
    </style>
  </defs>

  <rect width="920" height="620" fill="#ffffff"/>
  <text x="460" y="40" text-anchor="middle" class="title">校园智巡 · 3D 导航技术路线 — 两方案架构对比</text>
  <text x="460" y="62" text-anchor="middle" class="sub">建图层与规划层相同；唯一差异在「定位层」——本质只是谁来产出 map→base_link 这个 TF</text>

  <!-- ===================== Panel A ===================== -->
  <rect x="30" y="84" width="390" height="372" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="30" y="84" width="390" height="40" rx="12" fill="#64748b"/>
  <rect x="30" y="104" width="390" height="20" fill="#64748b"/>
  <text x="225" y="111" text-anchor="middle" class="head">方案一 · 全面采用 DDDMR 原生</text>

  <!-- A box1 -->
  <rect x="60" y="146" width="330" height="58" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="225" y="172" text-anchor="middle" class="box">LEGO-LOAM 3D 建图</text>
  <text x="225" y="192" text-anchor="middle" class="note">构建 3D 点云地图</text>
  <line x1="225" y1="204" x2="225" y2="232" class="flow" marker-end="url(#arrow)"/>

  <!-- A box2 (差异：MCL) -->
  <rect x="60" y="236" width="330" height="62" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="225" y="262" text-anchor="middle" class="box">MCL 3D 点云定位</text>
  <text x="225" y="284" text-anchor="middle" class="note" fill="#b45309">⚠ 室外开阔地特征稀疏，易不收敛 / 漂移</text>
  <line x1="225" y1="298" x2="225" y2="326" class="flow" marker-end="url(#arrow)"/>

  <!-- A box3 -->
  <rect x="60" y="330" width="330" height="58" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="225" y="356" text-anchor="middle" class="box">DDDMR 3D 全局 + 局部规划</text>
  <text x="225" y="376" text-anchor="middle" class="note">在三维空间中规划路径</text>

  <!-- A tag -->
  <rect x="60" y="408" width="330" height="34" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="225" y="430" text-anchor="middle" class="tag" fill="#b91c1c">代价：放弃「无图 + RTK」，项目定位重写</text>

  <!-- ===================== Panel B ===================== -->
  <rect x="500" y="84" width="390" height="372" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="500" y="84" width="390" height="40" rx="12" fill="#0d9488"/>
  <rect x="500" y="104" width="390" height="20" fill="#0d9488"/>
  <text x="695" y="111" text-anchor="middle" class="head">方案二 · DDDMR 3D 规划 + RTK 定位（混合）</text>

  <!-- B box1 -->
  <rect x="530" y="146" width="330" height="58" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="695" y="172" text-anchor="middle" class="box">预建 3D 地图（与 RTK 坐标对齐）</text>
  <text x="695" y="192" text-anchor="middle" class="note">一次性建图 + georeferencing</text>
  <line x1="695" y1="204" x2="695" y2="232" class="flow" marker-end="url(#arrow)"/>

  <!-- B box2 (差异：RTK) -->
  <rect x="530" y="236" width="330" height="62" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2.5"/>
  <text x="695" y="262" text-anchor="middle" class="box">RTK 定位（替代 MCL）</text>
  <text x="695" y="284" text-anchor="middle" class="note" fill="#047857">✓ 保留厘米级全局定位，室外稳健</text>
  <line x1="695" y1="298" x2="695" y2="326" class="flow" marker-end="url(#arrow)"/>

  <!-- B box3 -->
  <rect x="530" y="330" width="330" height="58" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="695" y="356" text-anchor="middle" class="box">DDDMR 3D 全局 + 局部规划</text>
  <text x="695" y="376" text-anchor="middle" class="note">在三维空间中规划路径</text>

  <!-- B tag -->
  <rect x="530" y="408" width="330" height="34" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="695" y="430" text-anchor="middle" class="tag" fill="#15803d">优势：保留 RTK 护城河 + 获得 3D 规划能力</text>

  <!-- ===================== center diff callout ===================== -->
  <rect x="430" y="240" width="60" height="54" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="460" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">唯一</text>
  <text x="460" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">差异</text>
  <line x1="430" y1="267" x2="392" y2="267" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="490" y1="267" x2="528" y2="267" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ===================== shared premise bar ===================== -->
  <rect x="30" y="480" width="860" height="56" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="460" y="505" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">共同前提（无论选哪条路线都需先完成）</text>
  <text x="460" y="525" text-anchor="middle" class="note">先确诊当前 map 漂移根因：RTK 原始数据 / IMU 噪声 / Mid-360→IMU 外参 / TF 对齐 / EKF 协方差</text>

  <text x="460" y="568" text-anchor="middle" class="note">说明：两方案的「建图层」与「规划层」一致，差异仅在定位层（MCL ↔ RTK）。定位层对下游规划器而言只是产出同一个 map→base_link 变换。</text>
  <text x="460" y="592" text-anchor="middle" class="sub">校园智巡 — 近一周进度汇报 · 2026-06-16</text>
</svg>
